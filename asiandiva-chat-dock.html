<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dave's Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --yellow:#FFD93D; --pink:#FF6B9D; --purple:#C77DFF; --green:#6EE7B7;
  --bg:#0f0a1e; --bg2:#17102b; --bg3:#1e1438;
  --border:#2e1e50; --text:#F5E6FF; --muted:#9B7BB8; --dim:#4A2870;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);overflow-y:auto;padding:12px;}
body::-webkit-scrollbar{width:4px;}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.dock-title{font-family:'Fredoka One',sans-serif;font-size:1.2rem;background:linear-gradient(135deg,var(--yellow),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:12px;}

.overlay-status{display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding:6px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.card-lbl{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

/* stream info */
.stat-boxes{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.stat-box{border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;border:1px solid;}
.stat-box.viewers{background:rgba(255,217,61,0.06);border-color:rgba(255,217,61,0.25);}
.stat-box.uptime{background:rgba(110,231,183,0.06);border-color:rgba(110,231,183,0.25);}
.stat-num{font-family:'Fredoka One',sans-serif;font-size:1.1rem;line-height:1;}
.stat-lbl{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.title-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.title-lbl{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.title-lbl span{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.edit-btn{font-size:8px;font-weight:800;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:2px 7px;cursor:pointer;font-family:'Nunito',sans-serif;}
.edit-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.save-btn{font-size:8px;font-weight:800;background:rgba(255,217,61,0.15);border:1px solid var(--yellow);border-radius:5px;color:var(--yellow);padding:2px 7px;cursor:pointer;font-family:'Nunito',sans-serif;display:none;}
.title-text{font-size:12px;font-weight:700;color:#c8d0f0;line-height:1.4;}
.title-input{display:none;width:100%;background:var(--bg2);border:1.5px solid var(--yellow);color:var(--text);padding:6px 8px;border-radius:7px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;outline:none;box-sizing:border-box;}


/* chat log */
.log-list{max-height:500px;overflow-y:auto;display:flex;flex-direction:column;}
.log-list::-webkit-scrollbar{width:3px;}
.log-list::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.log-item{display:flex;align-items:baseline;gap:6px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:32px;word-break:break-word;}
.log-item:last-child{border:none;}
.log-item.is-mention{background:rgba(255,217,61,0.08);border-radius:6px;padding:8px 6px;margin:2px 0;}
.log-name{font-weight:800;font-size:30px;flex-shrink:0;white-space:nowrap;}
.log-colon{color:var(--dim);flex-shrink:0;}
.log-msg{flex:1;color:#c8d0f0;display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
.log-msg.is-action{font-style:italic;color:var(--purple);}
.log-time{font-size:14px;color:var(--dim);flex-shrink:0;margin-left:4px;}
.log-empty{padding:30px 20px;text-align:center;font-size:13px;color:var(--dim);font-style:italic;}

/* event items */
.event-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin:4px 0;font-size:28px;font-weight:700;}
.event-item.sub{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.25);}
.event-item.giftsub{background:rgba(199,125,255,0.1);border:1px solid rgba(199,125,255,0.25);}
.event-item.raid{background:rgba(255,217,61,0.1);border:1px solid rgba(255,217,61,0.3);}
.event-item.bits{background:rgba(110,231,183,0.1);border:1px solid rgba(110,231,183,0.25);}
.event-item.firstchat{background:rgba(55,138,221,0.1);border:1px solid rgba(55,138,221,0.25);}
.event-icon{font-size:14px;flex-shrink:0;}
.event-text{flex:1;color:var(--text);line-height:1.4;}
.event-name{font-weight:800;}
.event-time{font-size:10px;color:var(--dim);flex-shrink:0;}

/* input */
.conn-status{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:8px;}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.wdot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
.wdot.conn{background:var(--yellow);animation:blink 0.5s infinite;}
.wdot.err{background:var(--pink);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* clear btn */
.clear-btn{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:2px 8px;cursor:pointer;font-family:'Nunito',sans-serif;}
.clear-btn:hover{border-color:var(--pink);color:var(--pink);}

/* slash command menu */
.cmd-menu{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;z-index:100;box-shadow:0 -8px 24px rgba(0,0,0,0.4);}
.cmd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
.cmd-item:last-child{border:none;}
.cmd-item:hover,.cmd-item.active{background:rgba(255,217,61,0.08);}
.cmd-name{font-family:'Fredoka One',sans-serif;font-size:14px;color:var(--yellow);flex-shrink:0;}
.cmd-desc{font-size:11px;font-weight:700;color:var(--muted);}
.cmd-usage{font-size:10px;color:var(--dim);font-weight:700;margin-left:auto;flex-shrink:0;}
</style>
</head>
<body>

<div class="dock-title">Dave's Chat 💬</div>

<div class="overlay-status">
  <div class="wdot" id="overlay-dot"></div>
  <span id="overlay-txt">Waiting for overlay…</span>
</div>

<!-- STREAM INFO -->
<div class="card">
  <div class="card-lbl">
    <span>📡 Stream Info</span>
    <span id="live-badge" style="display:none;background:rgba(255,107,157,0.2);color:var(--pink);border:1px solid rgba(255,107,157,0.4);border-radius:20px;padding:1px 8px;font-size:9px;letter-spacing:1px;">● LIVE</span>
  </div>
  <div class="stat-boxes">
    <div class="stat-box viewers">
      <span style="font-size:14px;">👁</span>
      <div><div class="stat-num" id="viewer-count" style="color:var(--yellow);">—</div><div class="stat-lbl">Viewers</div></div>
    </div>
    <div class="stat-box uptime">
      <span style="font-size:14px;">⏱</span>
      <div><div class="stat-num" id="stream-uptime" style="color:var(--green);">—</div><div class="stat-lbl">Uptime</div></div>
    </div>
  </div>
  <div class="title-wrap">
    <div class="title-lbl">
      <span>Stream Title</span>
      <div style="display:flex;gap:4px;">
        <button class="edit-btn" id="edit-btn" onclick="editTitle()">✏️ Edit</button>
        <button class="save-btn" id="save-btn" onclick="saveTitle()">💾 Save</button>
        <button class="save-btn" id="cancel-btn" onclick="cancelEdit()" style="background:transparent;border-color:var(--border);color:var(--muted);">✕</button>
      </div>
    </div>
    <div class="title-text" id="stream-title">Not live</div>
    <input class="title-input" id="title-input" type="text" maxlength="140" placeholder="Enter stream title…" onkeydown="if(event.key==='Enter') saveTitle()"/>
  </div>
</div>

  <div class="pinned-user" id="pinned-user"></div>
  <div class="pinned-text" id="pinned-text"></div>
</div>

<!-- CHAT LOG -->
<div class="card">
  <div class="card-lbl">
    <span>📋 Chat Log</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="log-count" style="color:var(--yellow);font-size:10px;font-weight:800;">0 msgs</span>
      <button class="clear-btn" onclick="clearLog()">🗑 Clear</button>
    </div>
  </div>
  <div class="log-list" id="log-list">
    <div class="log-empty" id="log-empty">Waiting for chat…</div>
  </div>
  <div style="position:relative;margin-top:10px;">
    <div class="cmd-menu" id="cmd-menu"></div>
    <div style="display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);align-items:center;">
      <input id="chat-input" type="text" placeholder="Type / for commands…" maxlength="500"
        oninput="handleInput(this.value)" onkeydown="handleKeydown(event)"
        style="flex:1;background:transparent;border:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;"/>
      <button id="send-btn" onclick="sendMessage()" disabled
        style="padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--yellow);font-family:'Fredoka One',sans-serif;font-size:13px;cursor:pointer;flex-shrink:0;opacity:0.3;transition:all 0.2s;">Send</button>
    </div>
  </div>
  <div class="conn-status">
    <div class="wdot" id="chat-dot"></div>
    <span id="chat-status">Not connected</span>
  </div>
</div>

<script>
// ── ALL VARIABLES ─────────────────────────────────────────────────
const BC            = new BroadcastChannel('asiandiva-chat');
const BROADCASTER   = '716266770';
const CLIENT_ID     = 'c76fsghzngwflbmg06o6c9hj2ffub2';
const MENTION_WORDS = ['asiandiva__','asiandiva','dave','@asiandiva__','@asiandiva','@dave'];
const COMMANDS = [
  {name:'/ban',desc:'Ban a user',usage:'/ban [user]'},
  {name:'/unban',desc:'Unban a user',usage:'/unban [user]'},
  {name:'/timeout',desc:'Timeout a user',usage:'/timeout [user] [sec]'},
  {name:'/slow',desc:'Slow mode',usage:'/slow [seconds]'},
  {name:'/slowoff',desc:'Slow mode off',usage:'/slowoff'},
  {name:'/subscribers',desc:'Subs only mode',usage:'/subscribers'},
  {name:'/emoteonly',desc:'Emote only mode',usage:'/emoteonly'},
  {name:'/clear',desc:'Clear chat',usage:'/clear'},
  {name:'/raid',desc:'Raid a channel',usage:'/raid [channel]'},
  {name:'/unraid',desc:'Cancel raid',usage:'/unraid'},
  {name:'/shoutout',desc:'Shoutout a user',usage:'/shoutout [user]'},
  {name:'/me',desc:'Action message',usage:'/me [message]'},
];

let token         = '';
let ircWs         = null;
let ircConnected  = false;
let ircToken      = null;
let ircAuthFailed = false;
let logCount      = 0;
let streamStart   = null;
let uptimeTimer   = null;
let activeCmd     = -1;
let filteredCmds  = [];
const emoteMap    = {};
const rawMsgs     = [];

// ── STARTUP ───────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const p = new URLSearchParams(window.location.search);
  token = p.get('token') || '';
  if(token) {
    loadEmotes(token).then(() => reRenderAll());
    connectIRC(token);
    fetchStreamInfo(token);
    setInterval(() => fetchStreamInfo(token), 60000);
  }
});

// ── PINNED MESSAGE POLLING ────────────────────────────────────────
let lastPinnedId = null;

async function pollPinnedMessage(tok) {
  try {
    const r = await fetch('https://api.twitch.tv/helix/channels/followed?user_id='+BROADCASTER+'&broadcaster_id='+BROADCASTER, {
      headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+tok}
    });
  } catch(e) {}
  // Poll chat settings for pinned messages
  try {
    const r = await fetch('https://api.twitch.tv/helix/chat/settings?broadcaster_id='+BROADCASTER, {
      headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+tok}
    });
    if(r.ok) {
      // chat settings don't include pinned messages directly
      // pinned messages come via IRC highlighted-message tag (already handled)
    }
  } catch(e){}
}

// ── BROADCAST CHANNEL ─────────────────────────────────────────────
BC.onmessage = (e) => {
  const msg = e.data;
  setOverlayDot(true);
  if(msg.type === 'ping')    return;
  if(msg.type === 'status')  setChatDot(msg.state, msg.text);
  if(msg.type === 'cleared') clearLog();
  if(msg.type === 'token' && !token) {
    token = msg.token;
    loadEmotes(token).then(() => reRenderAll());
    connectIRC(token);
    fetchStreamInfo(token);
    setInterval(() => fetchStreamInfo(token), 60000);
  }
};
setInterval(() => {
  try { BC.postMessage({type:'ping'}); setOverlayDot(true); } catch(e){}
}, 3000);

// ── EMOTE LOADING ─────────────────────────────────────────────────
async function loadEmotes(tok) {
  // Twitch channel emotes
  try {
    const r = await fetch('https://api.twitch.tv/helix/chat/emotes?broadcaster_id='+BROADCASTER, {
      headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+tok}
    });
    if(r.ok) { const d=await r.json(); (d.data||[]).forEach(e=>{ emoteMap[e.name]=e.images.url_1x; }); }
  } catch(e){}

  // BTTV global
  try {
    const r = await fetch('https://api.betterttv.net/3/cached/emotes/global');
    if(r.ok) { const d=await r.json(); d.forEach(e=>{ emoteMap[e.code]='https://cdn.betterttv.net/emote/'+e.id+'/1x'; }); }
  } catch(e){}

  // BTTV channel
  try {
    const cid = await fetch('https://decapi.me/twitch/id/asiandiva__').then(r=>r.text());
    const r = await fetch('https://api.betterttv.net/3/cached/users/twitch/'+cid.trim());
    if(r.ok) { const d=await r.json(); [...(d.channelEmotes||[]),...(d.sharedEmotes||[])].forEach(e=>{ emoteMap[e.code]='https://cdn.betterttv.net/emote/'+e.id+'/1x'; }); }
  } catch(e){}

  // 7TV global
  try {
    const r = await fetch('https://7tv.io/v3/emote-sets/global');
    if(r.ok) { const d=await r.json(); (d.emotes||[]).forEach(e=>{ const f=e.data?.host?.files?.find(f=>f.name==='1x.webp')||e.data?.host?.files?.[0]; if(f) emoteMap[e.name]='https:'+e.data.host.url+'/'+f.name; }); }
  } catch(e){}
}

// ── EMOTE RENDERING ───────────────────────────────────────────────
function renderMsg(text, emoteTags) {
  // Twitch emote positions from IRC tags
  const pos = {};
  if(emoteTags) {
    emoteTags.split('/').forEach(part => {
      const ci = part.lastIndexOf(':');
      if(ci===-1) return;
      const id=part.slice(0,ci), ranges=part.slice(ci+1);
      ranges.split(',').forEach(r => {
        const [s,e]=r.split('-').map(Number);
        pos[s]={end:e,id};
      });
    });
  }
  if(Object.keys(pos).length>0) {
    const chars=[...text]; let out='',i=0;
    while(i<chars.length) {
      if(pos[i]) {
        const {end,id}=pos[i];
        const word=chars.slice(i,end+1).join('');
        const url=emoteMap[word]||'https://static-cdn.jtvnw.net/emoticons/v2/'+id+'/default/dark/1.0';
        out+=emImg(url,word); i=end+1;
      } else { out+=esc(chars[i]); i++; }
    }
    return out;
  }
  // word matching
  return text.split(' ').map(w=>emoteMap[w]?emImg(emoteMap[w],w):esc(w)).join(' ');
}

function emImg(url,alt) {
  return '<img src="'+url+'" alt="'+esc(alt)+'" title="'+esc(alt)+'" style="height:32px;width:auto;vertical-align:middle;margin:0 2px;" onerror="this.style.display=\'none\'">';
}

function reRenderAll() {
  const list=document.getElementById('log-list');
  list.querySelectorAll('.log-item[data-raw]').forEach(item => {
    const span=item.querySelector('.log-msg');
    if(span) {
      const raw=item.dataset.raw, et=item.dataset.et||'';
      span.innerHTML=renderMsg(raw,et);
    }
  });
}

// ── IRC ───────────────────────────────────────────────────────────
function connectIRC(tok) {
  ircToken=tok;
  ircAuthFailed=false;
  if(ircWs){ircWs.onclose=null;ircWs.close();}
  ircWs=new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ircWs.onopen=()=>{
    ircWs.send('PASS oauth:'+tok);
    ircWs.send('NICK asiandiva__');
    ircWs.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    ircWs.send('JOIN #asiandiva__');
  };

  ircWs.onmessage=(e)=>{
    e.data.split('\r\n').forEach(line=>{
      if(!line) return;
      if(line.startsWith('PING')){ircWs.send('PONG :tmi.twitch.tv');return;}
      if(line.includes('Login authentication failed') || line.includes('Login unsuccessful')) {
        ircAuthFailed=true;
        ircConnected=false;
        setChatDot('err','Token expired — get a new OAuth token');
        return;
      }
      if(line.includes('366')||line.includes('JOIN #asiandiva__')) {
        ircConnected=true;
        setChatDot('live','Live · #asiandiva__');
        const btn=document.getElementById('send-btn');
        btn.disabled=false; btn.style.opacity='1'; btn.style.borderColor='var(--yellow)';
      }
      if(line.includes('PRIVMSG')) parsePRIVMSG(line);
      if(line.includes('USERNOTICE')) parseUSERNOTICE(line);
    });
  };

  ircWs.onclose=()=>{
    ircConnected=false;
    if(ircAuthFailed) {
      setChatDot('err','Token expired — get a new OAuth token');
      return;
    }
    setChatDot('conn','Reconnecting…');
    setTimeout(()=>connectIRC(ircToken),5000);
  };
}

function parsePRIVMSG(line) {
  try {
    const tags={};
    const tm=line.match(/^@([^ ]+)/);
    if(tm) tm[1].split(';').forEach(t=>{const[k,...v]=t.split('=');tags[k]=v.join('=');});
    let username=tags['display-name']||'';
    if(!username){const m=line.match(/:([^!]+)!/);if(m)username=m[1];}
    const mm=line.match(/PRIVMSG #\S+ :(.+)/);
    if(!mm||!username) return;
    let text=mm[1].trim();
    const isAction=text.startsWith('\x01ACTION ');
    if(isAction) text=text.slice(8).replace('\x01','').trim();
    const color=tags['color']||colorFor(username);
    const emoteTags=tags['emotes']||'';
    const isMention=MENTION_WORDS.some(w=>text.toLowerCase().includes(w.toLowerCase()));
    const t=now();
    addMsg(username,text,emoteTags,color,isMention,t,isAction);
    // first time chatter
    if(tags['first-msg']==='1') addEvent('firstchat',{user:username,color},t);
    // bits
    if(tags['bits']) addEvent('bits',{user:username,bits:parseInt(tags['bits']),msg:text},t);
  } catch(err){}
}

function parseUSERNOTICE(line) {
  try {
    const tags={};
    const tm=line.match(/^@([^ ]+)/);
    if(!tm) return;
    tm[1].split(';').forEach(t=>{const[k,...v]=t.split('=');tags[k]=v.join('=');});
    const msgId=tags['msg-id']||'';
    const user=tags['display-name']||tags['login']||'Someone';
    const color=tags['color']||'#C77DFF';
    const mm=line.match(/USERNOTICE #\S+ :(.*)/);
    const msg=mm?mm[1].trim():'';
    const t=now();
    if(msgId==='sub'||msgId==='resub') {
      addEvent('sub',{user,color,msg,months:tags['msg-param-cumulative-months']||'1'},t);
    }
    if(msgId==='subgift'||msgId==='submysterygift') {
      addEvent('giftsub',{user,color,count:tags['msg-param-mass-gift-count']||tags['msg-param-sender-count']||'1',recipient:tags['msg-param-recipient-display-name']||''},t);
    }
    if(msgId==='raid') {
      addEvent('raid',{user,color,viewers:tags['msg-param-viewerCount']||'0'},t);
    }
  } catch(err){}
}

// ── SEND MESSAGE ──────────────────────────────────────────────────
function sendMessage() {
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!ircConnected) return;
  const isMe=text.startsWith('/me ');
  const sendText=isMe?'\x01ACTION '+text.slice(4)+'\x01':text;
  ircWs.send('PRIVMSG #asiandiva__ :'+sendText);
  addMsg('AsianDiva__',isMe?text.slice(4):text,'','#FFD93D',false,now(),isMe);
  input.value='';
  hideCmdMenu();
}

// ── LOG FUNCTIONS ─────────────────────────────────────────────────
function addMsg(username,rawText,emoteTags,color,isMention,time,isAction) {
  document.getElementById('log-empty')?.remove();
  logCount++;
  document.getElementById('log-count').textContent=logCount+' msg'+(logCount!==1?'s':'');
  rawMsgs.push({username,rawText,emoteTags,color,isMention,time});
  if(rawMsgs.length>200) rawMsgs.shift();
  const rendered=renderMsg(rawText,emoteTags);
  const list=document.getElementById('log-list');
  const item=document.createElement('div');
  item.className='log-item'+(isMention?' is-mention':'');
  item.dataset.raw=rawText;
  item.dataset.et=emoteTags;
  item.innerHTML=
    '<span class="log-name" style="color:'+(color||'#FFD93D')+'">'+esc(username)+'</span>'+
    '<span class="log-colon">:</span>'+
    '<span class="log-msg'+(isAction?' is-action':'')+'">'+rendered+'</span>'+
    '<span class="log-time">'+time+'</span>';
  list.appendChild(item);
  while(list.children.length>200) list.removeChild(list.firstChild);
  list.scrollTop=list.scrollHeight;
}

function addEvent(type,data,time) {
  document.getElementById('log-empty')?.remove();
  logCount++;
  document.getElementById('log-count').textContent=logCount+' msg'+(logCount!==1?'s':'');
  const list=document.getElementById('log-list');
  const item=document.createElement('div');
  item.className='event-item '+type;
  let icon='⭐',html='';
  if(type==='sub') {
    icon='⭐';
    html='<span class="event-name" style="color:#FF6B9D">'+esc(data.user)+'</span> '+
      (data.months>1?'resubscribed for <strong>'+data.months+' months!</strong>':'just subscribed! 🎉')+
      (data.msg?'<br><span style="color:#c8d0f0;font-size:11px;">"'+esc(data.msg)+'"</span>':'');
  } else if(type==='giftsub') {
    icon='🎁';
    html='<span class="event-name" style="color:#C77DFF">'+esc(data.user)+'</span> gifted '+
      (data.count>1?'<strong>'+data.count+' subs</strong> to the community!':'a sub to <strong>'+esc(data.recipient)+'</strong>!');
  } else if(type==='raid') {
    icon='🚀';
    html='<span class="event-name" style="color:#FFD93D">'+esc(data.user)+'</span> is raiding with <strong>'+Number(data.viewers).toLocaleString()+' viewers!</strong> 🎉';
  } else if(type==='bits') {
    icon='💎';
    html='<span class="event-name" style="color:#6EE7B7">'+esc(data.user)+'</span> cheered <strong>'+data.bits.toLocaleString()+' bits!</strong>'+
      (data.msg?'<br><span style="color:#c8d0f0;font-size:11px;">"'+esc(data.msg)+'"</span>':'');
  } else if(type==='firstchat') {
    icon='👋';
    html='<span class="event-name" style="color:#378ADD">'+esc(data.user)+'</span> chatted for the first time! Welcome to Squad Crime! 💛';
  }
  item.innerHTML='<span class="event-icon">'+icon+'</span><span class="event-text">'+html+'</span><span class="event-time">'+time+'</span>';
  list.appendChild(item);
  while(list.children.length>200) list.removeChild(list.firstChild);
  list.scrollTop=list.scrollHeight;
}

function clearLog() {
  logCount=0;
  rawMsgs.length=0;
  document.getElementById('log-count').textContent='0 msgs';
  document.getElementById('log-list').innerHTML='<div class="log-empty" id="log-empty">Waiting for chat…</div>';
}

// ── STREAM INFO ───────────────────────────────────────────────────
async function fetchStreamInfo(tok) {
  if(!tok) return;
  try {
    const r=await fetch('https://api.twitch.tv/helix/streams?user_id='+BROADCASTER,{
      headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+tok}
    });
    if(!r.ok) { console.error('[StreamInfo] HTTP', r.status, await r.text()); return; }
    const d=await r.json();
    console.log('[StreamInfo] Response:', d);
    const s=d.data?.[0];
    if(s) {
      document.getElementById('viewer-count').textContent=s.viewer_count.toLocaleString();
      document.getElementById('stream-title').textContent=s.title||'No title';
      document.getElementById('live-badge').style.display='inline';
      if(!streamStart) { streamStart=new Date(s.started_at); uptimeTimer=setInterval(updateUptime,1000); }
    } else {
      document.getElementById('viewer-count').textContent='—';
      document.getElementById('stream-title').textContent='Not live';
      document.getElementById('live-badge').style.display='none';
      document.getElementById('stream-uptime').textContent='—';
      streamStart=null; clearInterval(uptimeTimer);
    }
  } catch(e){ console.error('[StreamInfo] Error:', e); }
}
function updateUptime() {
  if(!streamStart) return;
  const s=Math.floor((Date.now()-streamStart)/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  document.getElementById('stream-uptime').textContent=(h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

// ── TITLE EDIT ────────────────────────────────────────────────────
function editTitle() {
  document.getElementById('stream-title').style.display='none';
  document.getElementById('title-input').style.display='block';
  document.getElementById('title-input').value=document.getElementById('stream-title').textContent;
  document.getElementById('edit-btn').style.display='none';
  document.getElementById('save-btn').style.display='inline';
  document.getElementById('cancel-btn').style.display='inline';
  document.getElementById('title-input').focus();
}
function cancelEdit() {
  document.getElementById('stream-title').style.display='block';
  document.getElementById('title-input').style.display='none';
  document.getElementById('edit-btn').style.display='inline';
  document.getElementById('save-btn').style.display='none';
  document.getElementById('cancel-btn').style.display='none';
}
async function saveTitle() {
  const val=document.getElementById('title-input').value.trim();
  if(!val||!token) return;
  try {
    const r=await fetch('https://api.twitch.tv/helix/channels?broadcaster_id='+BROADCASTER,{
      method:'PATCH',
      headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({title:val})
    });
    if(r.ok||r.status===204) { document.getElementById('stream-title').textContent=val; cancelEdit(); }
  } catch(e){}
}

// ── SLASH COMMANDS ────────────────────────────────────────────────
function handleInput(val) {
  if(val.startsWith('/')) {
    const s=val.toLowerCase();
    filteredCmds=COMMANDS.filter(c=>c.name.startsWith(s));
    activeCmd=-1;
    renderCmdMenu();
  } else { hideCmdMenu(); }
}
function renderCmdMenu() {
  const menu=document.getElementById('cmd-menu');
  if(!filteredCmds.length){hideCmdMenu();return;}
  menu.innerHTML=filteredCmds.map((c,i)=>
    '<div class="cmd-item'+(i===activeCmd?' active':'')+'" onclick="selectCmd('+i+')">'+
    '<span class="cmd-name">'+c.name+'</span>'+
    '<span class="cmd-desc">'+c.desc+'</span>'+
    '<span class="cmd-usage">'+c.usage+'</span>'+
    '</div>'
  ).join('');
  menu.style.display='block';
}
function hideCmdMenu() { document.getElementById('cmd-menu').style.display='none'; filteredCmds=[]; activeCmd=-1; }
function selectCmd(i) {
  const cmd=filteredCmds[i];
  const input=document.getElementById('chat-input');
  input.value=cmd.usage;
  hideCmdMenu(); input.focus();
  const p=cmd.usage.indexOf('[');
  if(p>-1) input.setSelectionRange(p,cmd.usage.lastIndexOf(']')+1);
}
function handleKeydown(e) {
  const menu=document.getElementById('cmd-menu');
  if(menu.style.display==='block') {
    if(e.key==='ArrowDown'){e.preventDefault();activeCmd=Math.min(activeCmd+1,filteredCmds.length-1);renderCmdMenu();return;}
    if(e.key==='ArrowUp'){e.preventDefault();activeCmd=Math.max(activeCmd-1,-1);renderCmdMenu();return;}
    if(e.key==='Tab'||e.key==='Enter'){e.preventDefault();if(activeCmd>=0)selectCmd(activeCmd);else if(filteredCmds.length)selectCmd(0);return;}
    if(e.key==='Escape'){hideCmdMenu();return;}
  }
  if(e.key==='Enter') sendMessage();
}

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escHtml(s) { return esc(s); }
function now() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function colorFor(name) {
  const c=['#FF6B9D','#C77DFF','#6EE7B7','#FFD93D','#FF9A3C','#85B7EB'];
  let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
}
