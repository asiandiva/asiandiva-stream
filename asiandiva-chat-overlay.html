<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AsianDiva__ Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --yellow:  #FFD93D;
  --ydark:   #C89A00;
  --pink:    #FF6B9D;
  --purple:  #C77DFF;
  --green:   #6EE7B7;
  --bg:      #1A0A2E;
  --bg2:     #240D3F;
  --border:  #3D1A66;
  --text:    #F5E6FF;
  --muted:   #9B7BB8;
  --dim:     #4A2870;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

html { background: transparent; }

/* ── CHAT WIDGET ── */
#chat-widget {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 280px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 10px 12px;
  pointer-events: none;
}

#chat-box {
  background: rgba(20, 8, 38, 0.82);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255, 217, 61, 0.25);
  border-radius: 16px;
  padding: 10px 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow: hidden;
  height: 220px;
}

/* header bar inside box */
#chat-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 8px;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

#chat-header-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4A2870;
  flex-shrink: 0;
  transition: all 0.3s;
}
#chat-header-dot.live { background: #6EE7B7; box-shadow: 0 0 6px #6EE7B7; animation: blink 2s infinite; }
#chat-header-dot.conn { background: #FFD93D; animation: blink 0.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#chat-header-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #FFD93D, #FF6B9D);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#chat-messages {
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
  max-height: 100%;
  justify-content: flex-end;
  flex: 1;
}

.chat-msg {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: 0.78rem;
  font-weight: 700;
  line-height: 1.4;
  animation: msg-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  background: rgba(255,255,255,0.04);
  border-left: 2px solid var(--user-color, #FFD93D);
  border-radius: 0 6px 6px 0;
  padding: 4px 8px 4px 7px;
  max-width: 100%;
  word-break: break-word;
}

.chat-msg.action .chat-text { font-style:italic; color:#C77DFF; }

@keyframes msg-in {
  0%   { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}

.chat-name {
  font-weight: 800;
  font-size: 0.75rem;
  color: var(--user-color, var(--yellow));
  white-space: nowrap;
  flex-shrink: 0;
}

.chat-sep {
  color: var(--muted);
  font-size: 0.65rem;
  flex-shrink: 0;
}

.chat-text {
  color: var(--text);
  font-weight: 600;
  font-size: 0.75rem;
}

.chat-msg.mention {
  background: rgba(255, 217, 61, 0.12);
  border-left: 2px solid #FFD93D;
  animation: mention-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes mention-in {
  0%   { opacity: 0; transform: translateY(10px) scale(0.97); background: rgba(255,217,61,0.35); }
  60%  { background: rgba(255,217,61,0.25); }
  100% { opacity: 1; transform: translateY(0) scale(1); background: rgba(255,217,61,0.12); }
}

.mention-word {
  background: rgba(255, 217, 61, 0.25);
  color: #FFD93D;
  font-weight: 800;
  border-radius: 3px;
  padding: 0 3px;
}


/* status dot */
#status-dot {
  position: fixed;
  top: 8px;
  right: 10px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  display: block;
  z-index: 999;
}
#status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s infinite; }
#status-dot.conn { background: var(--yellow); animation: blink 0.5s infinite; }
#status-dot.err  { background: var(--pink); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── CONTROL PANEL ── */
#ctrl {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,5,20,0.96);
  backdrop-filter: blur(18px);
  z-index: 8000;
  align-items: center;
  justify-content: center;
}

/* private chat log */


/* ── HYPE TRAIN ALERT ── */
#hype-alert {
  display: none;
  background: linear-gradient(135deg, rgba(255,217,61,0.15), rgba(255,107,157,0.15));
  border: 1.5px solid var(--yellow);
  border-radius: 10px;
  padding: 8px 12px;
  margin-top: 10px;
  animation: hype-glow 1.2s ease-in-out infinite;
}

@keyframes hype-glow {
  0%,100% { box-shadow: 0 0 12px rgba(255,217,61,0.3); }
  50%      { box-shadow: 0 0 28px rgba(255,107,157,0.5); }
}


/* hype train connection card */


.wdot { width:6px;height:6px;border-radius:50%;background:var(--dim);display:inline-block;transition:all 0.3s; }
.wdot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
.wdot.conn{background:var(--yellow);animation:blink 0.5s infinite;}
.wdot.err{background:var(--pink);}



.btn-g {
  flex: 1; padding: 11px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.68rem; font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s;
}
.btn-g:hover { border-color: var(--pink); color: var(--pink); }

.err-ctrl {
  background: rgba(255,107,157,0.12);
  border: 1px solid rgba(255,107,157,0.35);
  border-radius: 8px; padding: 8px 12px;
  font-size: 0.66rem; font-weight: 700;
  color: var(--pink); margin-top: 8px; display: none;
}

/* max messages slider */
</style>
</head>
<body>

<div id="status-dot" class="wdot"></div>

<div id="chat-widget">
  <div id="chat-box">
    <div id="chat-header">
      <div id="chat-header-dot"></div>
      <span id="chat-header-label">Diva Squad Chat</span>
    </div>
    <div id="chat-status-msg" style="
      font-size: 0.65rem;
      font-weight: 800;
      color: #9B7BB8;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 6px;
      text-align: center;
    ">Connecting to chat…</div>
    <div id="chat-messages"></div>
  </div>
</div>

<script>
// ── SETUP ─────────────────────────────────────────────────────────
// ── BROADCAST CHANNEL ────────────────────────────────────────────
const BC = new BroadcastChannel('asiandiva-chat');

// ── STATE ─────────────────────────────────────────────────────────
let ws = null, connected = false, reconnTimer = null;
let channel = '', logCount = 0, MAX_MSGS = 20;
const MENTION_WORDS = ['asiandiva__', 'asiandiva', 'dave', '@asiandiva__', '@asiandiva', '@dave'];
BC.onmessage = (e) => {
  const msg = e.data;
  if(msg.type === 'clear')    clearChat();
  if(msg.type === 'test')     testMsg();
  if(msg.type === 'send_msg' && ws && ws.readyState === 1) {
    ws.send('PRIVMSG #' + channel + ' :' + msg.text);
  }
};
setInterval(() => { try { BC.postMessage({type:'ping'}); } catch(e){} }, 3000);

window.addEventListener('load', launch);

function launch() {
  channel = 'asiandiva__';
  setDot('conn', 'Connecting…');
  connectIRC();
  loadEmotes();
  // broadcast token to dock for stream info fetching
  const p = new URLSearchParams(window.location.search);
  const tok = p.get('token') || p.get('ht_token');
  if(tok) setTimeout(() => BC.postMessage({type:'token', token:tok}), 2000);
}

// ── BACKTICK TOGGLE ───────────────────────────────────────────────

// ── TWITCH IRC ────────────────────────────────────────────────────
function connectIRC() {
  if (ws) { ws.onclose = null; ws.close(); }

  ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
    ws.send('JOIN #' + channel);
  };

  ws.onmessage = (e) => {
    const lines = e.data.split('\r\n');
    lines.forEach(line => {
      if (!line) return;

      // keepalive
      if (line.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }

      // connected confirmation
      if (line.includes('366') || line.includes('JOIN #')) {
        connected = true;
        setDot('live', 'Live · #' + channel);
        // show waiting message in chat area until first message
        const sm = document.getElementById('chat-status-msg');
        if (sm) {
          sm.style.display = 'block';
          sm.textContent   = '✅ Connected to #' + channel + ' — waiting for chat…';
          sm.style.color   = '#6EE7B7';
        }
      }

      // parse chat message
      if (line.includes('PRIVMSG')) parseLine(line);
      if (line.includes('USERNOTICE')) parseUserNotice(line);
    });
  };

  ws.onerror = () => {}; // errors handled by onclose

  ws.onclose = () => {
    connected = false;
    setDot('conn', 'Standing by…');
    clearTimeout(reconnTimer);
    reconnTimer = setTimeout(connectIRC, 4000);
  };
}

// ── EMOTE STORE ──────────────────────────────────────────────────
// Map of word → image url for BTTV + 7TV emotes
const emoteMap = {};
// Map of Twitch emote ID → image url (from IRC tags)
let channelId = null;

async function loadEmotes() {
  try {
    // 1. Get Twitch channel ID from username
    const hRes = await fetch('https://decapi.me/twitch/id/' + channel);
    if (hRes.ok) {
      channelId = (await hRes.text()).trim();
    }
  } catch(e) {}

  // 2. Load BTTV global emotes
  try {
    const r = await fetch('https://api.betterttv.net/3/cached/emotes/global');
    if (r.ok) {
      const data = await r.json();
      data.forEach(e => {
        emoteMap[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/1x';
      });
    }
  } catch(e) {}

  // 3. Load BTTV channel emotes
  if (channelId) {
    try {
      const r = await fetch('https://api.betterttv.net/3/cached/users/twitch/' + channelId);
      if (r.ok) {
        const data = await r.json();
        [...(data.channelEmotes||[]), ...(data.sharedEmotes||[])].forEach(e => {
          emoteMap[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/1x';
        });
      }
    } catch(e) {}
  }

  // 4. Load 7TV global emotes
  try {
    const r = await fetch('https://7tv.io/v3/emote-sets/global');
    if (r.ok) {
      const data = await r.json();
      (data.emotes || []).forEach(e => {
        const file = e.data?.host?.files?.find(f => f.name === '1x.webp') || e.data?.host?.files?.[0];
        if (file) emoteMap[e.name] = 'https:' + e.data.host.url + '/' + file.name;
      });
    }
  } catch(e) {}

  // 5. Load 7TV channel emotes
  if (channelId) {
    try {
      const r = await fetch('https://7tv.io/v3/users/twitch/' + channelId);
      if (r.ok) {
        const data = await r.json();
        (data.emote_set?.emotes || []).forEach(e => {
          const file = e.data?.host?.files?.find(f => f.name === '1x.webp') || e.data?.host?.files?.[0];
          if (file) emoteMap[e.name] = 'https:' + e.data.host.url + '/' + file.name;
        });
      }
    } catch(e) {}
  }
}

// ── PARSE IRC LINE ────────────────────────────────────────────────
function parseLine(line) {
  try {
    let color    = null;
    let username = '';
    let emoteTags = '';

    const tagMatch = line.match(/^@([^ ]+)/);
    if (tagMatch) {
      const tags = {};
      tagMatch[1].split(';').forEach(t => {
        const [k, ...rest] = t.split('=');
        tags[k] = rest.join('=');
      });
      color     = tags['color'] || null;
      username  = tags['display-name'] || '';
      emoteTags = tags['emotes'] || '';
    }

    if (!username) {
      const prefixMatch = line.match(/:([^!]+)!/);
      if (prefixMatch) username = prefixMatch[1];
    }

    const msgMatch = line.match(/PRIVMSG #\S+ :(.+)/);
    if (!msgMatch || !username) return;
    let text = msgMatch[1].trim();
    if (!text) return;
    const isAction = text.startsWith('\x01ACTION ');
    if(isAction) text = text.slice(8).replace('\x01','').trim();

    // check for special message types
    if(tagMatch) {
      const tags = {};
      tagMatch[1].split(';').forEach(t => { const [k,...v]=t.split('='); tags[k]=v.join('='); });
      // pinned message
      if(tags['msg-id'] === 'highlighted-message') {
        BC.postMessage({ type:'pinned', username, text });
      }
      // first time chatter
      if(tags['first-msg'] === '1') {
        BC.postMessage({ type:'event', eventType:'firstchat', eventData:{ user:username, color }, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
      }
      // bits cheer
      if(tags['bits']) {
        const bits = parseInt(tags['bits']);
        BC.postMessage({ type:'event', eventType:'bits', eventData:{ user:username, bits, color, msg:text }, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
      }
    }

    // Blerp detection handled by backend IRC — no chat overlay duplication

    addMessage(username, text, color, emoteTags, isAction);
  } catch(e) {}
}

// ── RENDER MESSAGE ────────────────────────────────────────────────
function parseUserNotice(line) {
  try {
    const tagMatch = line.match(/^@([^ ]+)/);
    if (!tagMatch) return;
    const tags = {};
    tagMatch[1].split(';').forEach(t => { const [k,...v]=t.split('='); tags[k]=v.join('='); });
    const msgId   = tags['msg-id'] || '';
    const user    = tags['display-name'] || tags['login'] || 'Someone';
    const color   = tags['color'] || '#C77DFF';
    const sysMsg  = tags['system-msg']?.replace(/\s/g,' ') || '';
    const msgMatch = line.match(/USERNOTICE #\S+ :(.*)/);
    const msg     = msgMatch ? msgMatch[1].trim() : '';

    let eventType = null;
    let eventData = {};

    // Sub / Resub
    if (msgId === 'sub' || msgId === 'resub') {
      eventType = 'sub';
      eventData = { user, color, sysMsg, msg, months: tags['msg-param-cumulative-months'] || '1' };
    }
    // Gift sub
    if (msgId === 'subgift' || msgId === 'submysterygift') {
      eventType = 'giftsub';
      eventData = { user, color, sysMsg, count: tags['msg-param-mass-gift-count'] || tags['msg-param-sender-count'] || '1', recipient: tags['msg-param-recipient-display-name'] || '' };
    }
    // Raid
    if (msgId === 'raid') {
      eventType = 'raid';
      eventData = { user, color, viewers: tags['msg-param-viewerCount'] || '0' };
    }
    // First time chatter handled in PRIVMSG via first-msg tag

    if (eventType) {
      BC.postMessage({ type:'event', eventType, eventData, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
    }
  } catch(e) {}
}

function colorForUser(name) {
  const colors = ['#FF6B9D','#C77DFF','#6EE7B7','#FFD93D','#FF9A3C','#85B7EB'];
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  return colors[Math.abs(hash) % colors.length];
}

function addMessage(username, text, color, emoteTags, isAction) {
  const sm = document.getElementById('chat-status-msg');
  if (sm) sm.style.display = 'none';

  const userColor  = color && color !== '' ? color : colorForUser(username);
  const container  = document.getElementById('chat-messages');
  const isMention  = MENTION_WORDS.some(w => text.toLowerCase().includes(w.toLowerCase()));

  const msg = document.createElement('div');
  msg.className = 'chat-msg' + (isMention ? ' mention' : '') + (isAction ? ' action' : '');
  msg.style.setProperty('--user-color', userColor);

  const renderedText = renderMessage(text, emoteTags || '', isMention);

  msg.innerHTML =
    '<span class="chat-name">' + escHtml(username) + '</span>' +
    '<span class="chat-sep">·</span>' +
    '<span class="chat-text">' + renderedText + '</span>';

  container.appendChild(msg);
  trimMessages();
  addToLog(username, text, userColor, isMention);
}

function addToLog(username, renderedText, color, isMention) {
  logCount++;
  const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  BC.postMessage({ type:'message', username, text:renderedText, color, isMention, time:t, count:logCount });
}

// ── RENDER TEXT WITH EMOTES ───────────────────────────────────────
function renderMessage(text, emoteTags, isMention) {
  // Build a map of character positions → Twitch emote image
  // emoteTags format: "emoteid:start-end,start-end/emoteid:start-end"
  const twitchPositions = {};
  if (emoteTags) {
    emoteTags.split('/').forEach(part => {
      const [id, positions] = part.split(':');
      if (!positions) return;
      positions.split(',').forEach(pos => {
        const [start, end] = pos.split('-').map(Number);
        twitchPositions[start] = { end, url: 'https://static-cdn.jtvnw.net/emoticons/v2/' + id + '/default/dark/1.0' };
      });
    });
  }

  // If we have Twitch emote positions, build char-by-char
  if (Object.keys(twitchPositions).length > 0) {
    let result = '';
    let i = 0;
    const chars = [...text]; // handle unicode correctly
    while (i < chars.length) {
      if (twitchPositions[i]) {
        const { end, url } = twitchPositions[i];
        const emoteName = chars.slice(i, end + 1).join('');
        result += emoteImg(url, emoteName);
        i = end + 1;
      } else {
        result += escHtml(chars[i]);
        i++;
      }
    }
    // still check remaining words for BTTV/7TV
    return result;
  }

  // No Twitch emotes — split by word and check BTTV/7TV map
  return text.split(' ').map(word => {
    if (emoteMap[word]) return emoteImg(emoteMap[word], word);
    if (isMention && MENTION_WORDS.some(w => word.toLowerCase() === w.toLowerCase())) {
      return '<span class="mention-word">' + escHtml(word) + '</span>';
    }
    return escHtml(word);
  }).join(' ');
}

function emoteImg(url, alt) {
  return '<img src="' + url + '" alt="' + escHtml(alt) + '" title="' + escHtml(alt) + '" style="height:20px;width:auto;vertical-align:middle;margin:0 1px;" />';
}

function trimMessages() {
  const container = document.getElementById('chat-messages');
  while (container.children.length > MAX_MSGS) {
    container.removeChild(container.firstChild);
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}



// ── CONTROLS ──────────────────────────────────────────────────────


function clearChat() {
  document.getElementById('chat-messages').innerHTML = '';
  logCount = 0;
  BC.postMessage({ type:'cleared' });
}

function testMsg() {
  addMessage('AsianDiva__', '✨ Chat is working! Squad Crime in the chat 💛', '#FFD93D', '');
  addMessage('LokiFan',     'Hype hype hype!! 🔥', '#FF6B9D', '');
  addMessage('HypeKing',    'yo Dave that clip was insane!!', '#C77DFF', '');
  addMessage('NightOwl99',  '@asiandiva__ you should play this game!', '#6EE7B7', '');
}

function setDot(state, text) {
  const sd  = document.getElementById('status-dot');
  const hd  = document.getElementById('chat-header-dot');
  const cls = state === 'live' ? ' live' : state === 'conn' ? ' conn' : state === 'err' ? ' err' : '';
  sd.className = 'wdot' + cls;
  if (hd) { hd.className = cls.trim(); }
  BC.postMessage({ type:'status', state, text });

  // show/hide status message in chat area
  const sm = document.getElementById('chat-status-msg');
  if (sm) {
    if (state === 'live') {
      sm.style.display = 'none'; // hide once connected — chat messages take over
    } else if (state === 'conn') {
      sm.style.display = 'block';
      sm.textContent = '⏳ Connecting to #' + channel + '…';
      sm.style.color = '#C89A00';
    } else {
      sm.style.display = 'block';
      sm.textContent = '💤 Stream offline — chat ready when you go live';
      sm.style.color = '#9B7BB8';
    }
  }
}


</script>
</body>
</html>
